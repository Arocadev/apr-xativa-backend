services:
  db:
    image: mysql:8.0
    container_name: apr-xativa-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: apr_xativa
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: apr-xativa-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/apr_xativa?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ../apr-xativa-web
    container_name: apr-xativa-web
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  - mysql_data:/var/lib/mysql
  - ./docker/apr_xativa.sql:/docker-entrypoint-initdb.d/init.sql